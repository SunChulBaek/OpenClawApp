name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Install dependencies
      run: flutter pub get

    - name: Restore keystore (if provided)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          mkdir -p ci/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > ci/keystore/mykeystore.jks
          printf 'storeFile=ci/keystore/mykeystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties
          echo "Keystore restored"
        else
          echo "No KEYSTORE_BASE64 secret found, skipping keystore restore"
        fi

    - name: Check keystore file (debug)
      run: |
        if [ -f ci/keystore/mykeystore.jks ]; then
          echo "keystore exists"
          ls -la ci/keystore || true
          echo "size: $(stat -c%s ci/keystore/mykeystore.jks)"
        else
          echo "keystore not found"
        fi

    - name: Analyze
      run: flutter analyze || true

    - name: Run tests
      run: flutter test --coverage || true

    - name: Build APK
      run: flutter build apk --release --no-shrink

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-${{ github.run_id }}
        path: build/app/outputs/flutter-apk/app-release.apk
